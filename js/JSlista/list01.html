<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lista</title>
</head>
<body>
    <script>

        /*exe 01
      1. Elabore um programa em JavaScript que realize as quatro operações básicas da matemática
       (soma, subtração, multiplicação e divisão) com base em dois números inteiros fornecidos pelo usuário.*/

        //Variáveis/ Entrada 
      var n1,n2, soma, subtracao, multiplicacao, divisão

        //Entrada de dados
      
     n1=parseFloat(prompt('n1do Produto'))
     n2=parseFloat(prompt('n2 do Produto'))
     
     
      
        
        //Processamento

       
        soma= n1+n2
        subtracao=n1-n2
        multiplicacao=n1*n2
        divisao=n1/n2

       
       

        //Saída de dados
        
       alert(soma)
       alert(subtracao)
       alert(multiplicacao)
       alert(divisao)
        
    </script>
    
</body>
</html>
