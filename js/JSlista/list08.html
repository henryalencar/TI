    <script>

        /*exe 08
       8. Área do Círculo: Solicite o raio de um círculo e calcule sua área. DICA: const PI = Math.PI;. Fórmula: Área=π×Raio ao quadrado*/

    //Variáveis/ Entrada 
    var raio, area

    
    //Entrada de dados
      
    
      raio=(prompt('raio do circulo'))

      
        
    //Processamento
    
     area =  (raio * raio)
     area = Math.PI * (raio * raio);

       

  //Saída de dados
      
    
     alert('a area do circulo e' + area )

    
        
        
    </script>
