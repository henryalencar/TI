  <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lista</title>
</head>
<body>
    <script>

        /*exe 11
       11. Temperatura (Celsius para Fahrenheit): Solicite a temperatura em Celsius e converta-a para Fahrenheit. Fórmula: Fahrenheit=Celsius×1.8+32*/

    //Variáveis/ Entrada 
    var Celsius, Fahrenheit

    
    //Entrada de dados
      
     Celsius=parseFloat(prompt('temperatura em celsius'))
     
        
    //Processamento
    
     Fahrenheit = Celsius * 1.8 + 32


       

  //Saída de dados
      
    
    alert( 'a temperatura' + Fahrenheit)

    
        
        
    </script>
