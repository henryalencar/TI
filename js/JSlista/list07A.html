    <script>

        /*exe 07
       7.A Volume do Cubo: Solicite o valor da aresta de um cubo e calcule seu volume. Vlume =Aresta ao cubo (DICA: Math.pow(aresta, 3)).

       B Teorema de Pitágoras: Solicite os valores dos catetos a e b de um triângulo retângulo e calcule o valor da hipotenusa h.*/

    //Variáveis/ Entrada 
    var aresta, volume

    
    //Entrada de dados
      
    
      aresta=(prompt('valor da aresta'))
      
        
    //Processamento

      volume= aresta * 3
       

  //Saída de dados
      
    alert ( 'o volume do cubo é:' + volume + 'cm')
     

    
        
        
    </script>
