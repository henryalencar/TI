    <script>

     /*exe 13
      13. Crie um programa que calcule a média simples de três notas de um aluno e,
      em seguida, arredonde essa média para o inteiro mais próximo. DICA: Use a função Math.round() para arredondar o valor da média final.*/

    //Variáveis/ Entrada 
    var n1, n2, n3,  media

    
    //Entrada de dados
      n1=parseFloat(prompt('Digite a nota 1'))
      n2=parseFloat(prompt('Digite a nota 2'))
      n3=parseFloat(prompt('Digite a nota 3'))
    
        
    //Processamento
    
    media=(n1 + n2 + n3) / 3;


       

  //Saída de dados
      
    alert('a media do aluno é; '+ media)
   
    
        
        
    </script>
