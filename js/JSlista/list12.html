  <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lista</title>
</head>
<body>
    <script>

        /*exe 12
      12. Elabore um programa que calcule o valor em Reais, correspondente aos dólares que um turista possui no cofre do hotel.
       O programa deve solicitar os seguintes dados: Quantidade de dólares guardados no cofre e cotação do dólar naquele dia. E deve exibir o valor em reais.*/

    //Variáveis/ Entrada 
    var dolares, cotacao, reais

    
    //Entrada de dados
      
    dolares=parseFloat(prompt('dolares'))
    cotacao=parseFloat(prompt('cotacao'))
     
        
    //Processamento
    
    reais= dolares * cotacao


       

  //Saída de dados
      
    
    alert( 'a quantidade é' + dolares + reais)

    
        
        
    </script>
