  <!DOCTYPE html>

<body>
    <script>

        /*exe 10
       10. Preço com Juros Simples: Solicite o valor principal, a taxa de juros (como decimal, Ex: 0.05) e o número de meses.
        Calcule o montante final. Fórmula: Montante=Principal×(1+Taxa×Meses)*/

    //Variáveis/ Entrada 
    var principal, taxa, meses, total

    
    //Entrada de dados
      
    principal=parseFloat(prompt('valor principal'))
    taxa=parseFloat(prompt('valor da taxa'))
    meses=parseFloat(prompt('valordos meses'))
     

        
    //Processamento
    
     total = principal * (1 + taxa * meses);

       

  //Saída de dados
      
    
    alert(total)

    
        
        
    </script>
