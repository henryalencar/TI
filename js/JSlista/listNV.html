<body>
    <script>

     /*exe Lista Nova
     */

    //Variáveis/ Entrada 
    var n1, n2 ,  media , resultado

    
    //Entrada de dados
     
     n1=parseFloat(prompt('Digite a nota 1'))
     n2=parseFloat(prompt('Digite a nota 2'))
     
    
        
    //Processamento
    
     media=(n1 + n2) /2
    
     if(media > 60)                                  //oque me ajudou a fazer (base)
     resultado='aprovado' 

     else resultado='reprovado'


       

  //Saída de dados
      
    alert( 'a nota:' + media + resultado)

    
   
   
    
        
        
    </script>
