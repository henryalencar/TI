<script>
     /**exe Lista Nova
      10
   Fazer um programa para ler dois números inteiros, e dizer se um número é múltiplo do outro. Os números podem ser digitados em qualquer ordem. 
 
 */


    //Variáveis/ Entrada 
   
    
    //Entrada de dados
     
    let n1= parseInt(prompt('digite o Primeiro Numero Inteiro'))
    let n2= parseInt(prompt('digite o Segundo Numero Inteiro'))
   

    //Processamento
    
    if(n1 % n2 === 0 || n2 % n1 === 0){
      alert('Os Numeros são Multiplos!')
    }

    else('Os Numeros nã são Multiplos')
    
   

  //Saída de dados
  
        
    </script>
