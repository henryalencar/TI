  <!DOCTYPE html>

</head>
<body>
    
<script>
     /**exe Lista Nova
      13
 Leia os valores das coordenadas X e Y de um ponto no plano cartesiano. A seguir, determine qual o quadrante ao qual pertence o ponto (Q1, Q2, Q3 ou Q4). Se o ponto estiver na origem, escreva a mensagem “Origem”. Se o ponto estiver sobre um dos eixos escreva “Eixo X” ou “Eixo Y”, conforme for a situação.
 */
    //Variáveis/ Entrada 
   
    //Entrada de dados
     
    let x=parseFloat(prompt('digite o valor de X'))
    let y=parseFloat(prompt('digite o valor de Y'))
    let resultado
    
    //Processamento
    if( x === 0 && y === 0){
    resultado = 'origem'
    }

    else if(x === 0){
      resultado = 'Eixo y'
    }

    else if(y === 0){
      resultado = 'Eixo x'
    }

    else if(x > 0 && y > 0){
      resultado = 'Q1'
    }

    else if(x < 0 && y > 0){
      resultado = 'Q2'
    }

    else if(x  < 0 && y < 0 ){
      resultado = 'Q3'
    }

    else{
      resultado = 'Q4'
    }
  //Saída de dados
   alert('O ponto das codernadas sera : ' + resultado )
  
        
    </script>
