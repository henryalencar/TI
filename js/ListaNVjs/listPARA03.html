<script>
     /**exe Lista Nova PARA
      03
Problema "sequencia_impares" (adaptado de URI 1067)
Leia um valor inteiro X. Em seguida mostre os ímpares de 1 até X, um valor por linha, inclusive o X,
se for o caso. 

.*/
  //Variáveis/ Entrada 
   
  //Entrada de dados
let x = Number(prompt('Digite o valor INTEIRO do x'))
  
  //Processamento
for(let i = 1 ; i<=x ; i++){
  if(i % 2 !== 0 ){
    document.write(i + '<br>') //document.write = comando de saída,(apararece na tela) 
  }                            //console.log = comando de saída no Navegador (console navegador)
  
}
  //Saída de dados
 

  </script>
