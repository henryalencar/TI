=  <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Nova js</title>
</head>
<body>
    
<script>
     /**exe Lista Nova PARA
      01
Problema "tabuada"
Ler um número inteiro N, daí mostrar na tela a tabuada de N para 1 a 10, conforme exemplo. 
.*/
  //Variáveis/ Entrada 
   
  //Entrada de dados
  let numero = Number(prompt('Digite o numero da tabuada'))

  let resultado
  //Processamento

  for( let i = 1; i <= 10 ;i++ ){
 resultado += `${numero} x ${i} = ${ numero * i} \n`
  }

  //Saída de dados
 alert(resultado)

  </script>
