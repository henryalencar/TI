<script>
     /**exe Lista Nova CRECENETE
      04
      
Problema "quadrante" (adaptado de URI 1115)
Escreva um programa para ler as coordenadas (X,Y) de uma quantidade indeterminada de pontos no
sistema cartesiano. Para cada ponto escrever o quadrante a que ele pertence (Q1, Q2, Q3 ou Q4). O
algoritmo será encerrado quando pelo menos uma de duas coordenadas for NULA (nesta situação sem
escrever mensagem alguma). 

.*/
  //Variáveis/ Entrada 
   
  //Entrada de dados
  let x = Number(prompt('digite o valor de x'))
  let y = Number(prompt('digite o valor de y'))
   
  //Processamento
  
 while (x !== 0 && y !== 0) {
  
  if (x > 0 && y > 0) {
    alert("Q1")
  } 
  else if (x < 0 && y > 0) {
    alert("Q2")
  } 
  else if (x < 0 && y < 0) {
    alert("Q3")
  } 
  else if (x > 0 && y < 0) {
    alert("Q4")
  }

  x = Number(prompt('digite o valor de x'))
  y = Number(prompt('digite o valor de y'))
 
}


   
  //Saída de dados
 
    </script>
